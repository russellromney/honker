name: Proof · npm Bun package

on:
  push:
    tags:
      - "bun-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: bun package
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Rust
        run: rustup default stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          enable-cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          no-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: ""

      - name: Build extension and Python interop package
        run: |
          cargo build --release -p honker-extension --features kernel-watcher,shm-fast-path
          uv venv --python "3.14" .venv
          . .venv/bin/activate
          uv pip install pytest pytest-xdist maturin
          cd packages/honker
          maturin develop --release --features kernel-watcher,shm-fast-path

      - name: Test Bun package
        working-directory: packages/honker-bun
        env:
          HONKER_EXT_PATH: ${{ github.workspace }}/target/release/libhonker_ext.so
          HONKER_INTEROP_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: |
          bun install --frozen-lockfile
          bun test
          npm pack --pack-destination "$RUNNER_TEMP"

      - name: Upload npm package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: honker-bun-npm
          path: ${{ runner.temp }}/*.tgz
          if-no-files-found: error
