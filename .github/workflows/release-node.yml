name: Proof · npm Node package

on:
  push:
    tags:
      - "node-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native:
    name: node native · ${{ matrix.platform }}
    timeout-minutes: 25
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-gnu
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - platform: linux-arm64-gnu
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
          - platform: darwin-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: darwin-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Rust
        run: |
          rustup default stable
          rustup target add "${{ matrix.rust_target }}"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: ""

      - name: Build native package
        working-directory: packages/honker-node
        run: |
          npm install
          npm exec -- napi build \
            --platform \
            --release \
            --target "${{ matrix.rust_target }}" \
            --features kernel-watcher,shm-fast-path
          test -f "honker.${{ matrix.platform }}.node"
          ../../scripts/proof/check-node-native-artifacts.sh "honker.${{ matrix.platform }}.node"
          node - <<'JS'
          const platform = '${{ matrix.platform }}';
          const expectedArch = platform.includes('x64') ? 'x64' : 'arm64';
          if (process.arch === expectedArch) {
            require(`./honker.${platform}.node`);
            console.log(`native load ok: ${platform}`);
          } else {
            console.log(`native load skipped on ${process.arch}: ${platform}`);
          }
          JS

      - name: Upload native artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: node-native-${{ matrix.platform }}
          path: packages/honker-node/honker.${{ matrix.platform }}.node
          if-no-files-found: error

  package:
    name: npm package
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: ""

      - name: Download native artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: node-native-*
          path: packages/honker-node
          merge-multiple: true

      - name: Pack and smoke test
        working-directory: packages/honker-node
        run: |
          npm install
          npm exec -- napi artifacts --output-dir . --npm-dir npm
          ../../scripts/proof/check-node-native-artifacts.sh honker.*.node npm/*/*.node
          node -e "require('./npm/linux-x64-gnu/honker.linux-x64-gnu.node'); console.log('linux-x64 native load ok')"
          for dir in npm/*; do
            test -f "$dir"/honker.*.node
          done
          package_dir="$RUNNER_TEMP/node-packages"
          mkdir -p "$package_dir"
          mkdir -p "$RUNNER_TEMP/node-consumer"
          npm pack --pack-destination "$package_dir"
          for dir in npm/*; do
            npm pack "./$dir" --pack-destination "$package_dir"
          done
          cd "$RUNNER_TEMP/node-consumer"
          npm init -y >/dev/null
          root_tgz=$(find "$package_dir" -maxdepth 1 -name 'russellthehippo-honker-node-[0-9]*.tgz' -print -quit)
          platform_tgz=$(find "$package_dir" -maxdepth 1 -name 'russellthehippo-honker-node-linux-x64-gnu-*.tgz' -print -quit)
          test -n "$root_tgz"
          test -n "$platform_tgz"
          npm install "$root_tgz" "$platform_tgz" >/dev/null
          node - <<'JS'
          const assert = require('node:assert/strict');
          const fs = require('node:fs');
          const os = require('node:os');
          const path = require('node:path');
          const { open } = require('@russellthehippo/honker-node');
          const dir = fs.mkdtempSync(path.join(os.tmpdir(), 'honker-node-release-'));
          try {
            const db = open(path.join(dir, 'app.db'));
            const q = db.queue('emails');
            const id = q.enqueue({ to: 'alice@example.com' });
            const job = q.claimOne('worker-1');
            assert.equal(job.id, id);
            assert.equal(job.payload.to, 'alice@example.com');
            assert.equal(job.ack(), true);
            db.close();
          } finally {
            fs.rmSync(dir, { recursive: true, force: true });
          }
          JS

      - name: Upload npm package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: honker-node-npm
          path: ${{ runner.temp }}/node-packages/*.tgz
          if-no-files-found: warn
