name: Proof · Hex package

on:
  push:
    tags:
      - "ex-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: elixir package
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Rust
        run: rustup default stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          enable-cache: false
      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124  # v1
        with:
          otp-version: "27"
          elixir-version: "1.19"

      - name: Build extension and Python interop package
        run: |
          cargo build --release -p honker-extension --features kernel-watcher,shm-fast-path
          uv venv --python "3.14" .venv
          . .venv/bin/activate
          uv pip install pytest pytest-xdist maturin
          cd packages/honker
          maturin develop --release --features kernel-watcher,shm-fast-path

      - name: Test and build Hex package
        working-directory: packages/honker-ex
        env:
          HONKER_EXTENSION_PATH: ${{ github.workspace }}/target/release/libhonker_ext.so
          HONKER_INTEROP_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: |
          mix local.hex --force
          mix deps.get
          mix test
          mix hex.build

      - name: Upload Hex package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: honker-hex
          path: packages/honker-ex/honker-*.tar
          if-no-files-found: error
