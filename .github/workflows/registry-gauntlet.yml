name: Proof · registry install gauntlet

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "PyPI honker version to install; empty means latest"
        required: false
        default: ""
      node_version:
        description: "npm @russellthehippo/honker-node version to install; empty means latest"
        required: false
        default: ""
      bun_version:
        description: "npm @russellthehippo/honker-bun version to install; empty means latest"
        required: false
        default: ""
      ruby_version:
        description: "RubyGems honker version to install; empty means latest"
        required: false
        default: ""
      dotnet_version:
        description: "NuGet Honker version to install; empty means latest"
        required: false
        default: ""
      elixir_version:
        description: "Hex honker version to install; empty means latest matching ~> 0.1"
        required: false
        default: ""
      rust_version:
        description: "crates.io honker version to install; empty means latest"
        required: false
        default: ""
      go_ref:
        description: "Go module ref for github.com/russellromney/honker-go"
        required: false
        default: "latest"
      cpp_ref:
        description: "GitHub ref/archive for packages/honker-cpp"
        required: false
        default: "main"
  schedule:
    # Weekly registry proof, separate from normal CI because it hits public
    # package managers and validates the ecosystem state.
    - cron: "41 8 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  registry-gauntlet:
    name: registry install gauntlet · ubuntu
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Set up Rust
        run: rustup default stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          enable-cache: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          no-cache: true
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f  # v1.306.0
        with:
          ruby-version: "3.4"
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: "1.25.x"
          cache: false
      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124  # v1
        with:
          otp-version: "27"
          elixir-version: "1.19"
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          use-cache: false

      - name: Install native consumer dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libsqlite3-dev nlohmann-json3-dev

      - name: Run registry/source install gauntlet
        env:
          PYTHON_VERSION: "3.14"
          HONKER_PY_VERSION: ${{ inputs.python_version || '' }}
          HONKER_NODE_VERSION: ${{ inputs.node_version || '' }}
          HONKER_BUN_VERSION: ${{ inputs.bun_version || '' }}
          HONKER_RUBY_VERSION: ${{ inputs.ruby_version || '' }}
          HONKER_DOTNET_VERSION: ${{ inputs.dotnet_version || '' }}
          HONKER_ELIXIR_VERSION: ${{ inputs.elixir_version || '' }}
          HONKER_RUST_VERSION: ${{ inputs.rust_version || '' }}
          HONKER_GO_REF: ${{ inputs.go_ref || 'latest' }}
          HONKER_CPP_REF: ${{ inputs.cpp_ref || 'main' }}
        run: bash scripts/proof/registry-install-gauntlet.sh
