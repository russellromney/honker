name: Release · PyPI

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload built wheels to PyPI"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  wheels:
    name: python wheel · ${{ matrix.platform }}
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
          - platform: linux-arm64
            os: ubuntu-24.04-arm
          - platform: macos-x64
            os: macos-13
          - platform: macos-arm64
            os: macos-latest
          - platform: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - name: Install maturin
        run: python -m pip install "maturin>=1.7,<2"

      - name: Build ABI3 wheel
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          cargo build --release -p honker-extension
          scripts/copy-python-extension.sh
          if [[ "$RUNNER_OS_NAME" == "Windows" ]]; then
            python -m maturin build --release \
              --features bundled-sqlite \
              --manifest-path packages/honker/Cargo.toml \
              --out dist
          else
            python -m maturin build --release \
              --manifest-path packages/honker/Cargo.toml \
              --out dist
          fi
          python scripts/proof/check-python-wheel.py dist/*.whl

      - name: Upload wheels to PyPI
        if: ${{ (github.event_name == 'push' && startsWith(github.ref_name, 'py-v')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install twine
          python -m twine upload --skip-existing dist/*.whl
