name: Proof · PyPI package

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: python wheel · ${{ matrix.platform }}
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
          - platform: linux-arm64
            os: ubuntu-24.04-arm
          - platform: macos-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: macos-arm64
            os: macos-latest
          - platform: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Rust
        run: rustup default stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - name: Install maturin
        run: python -m pip install "maturin>=1.7,<2"

      - name: Build ABI3 wheel
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          cargo_args=(--release -p honker-extension)
          maturin_args=(build --release --manifest-path packages/honker/Cargo.toml --out dist)
          if [[ -n "$RUST_TARGET" ]]; then
            rustup target add "$RUST_TARGET"
            cargo_args+=(--target "$RUST_TARGET")
            maturin_args+=(--target "$RUST_TARGET")
          fi
          cargo build "${cargo_args[@]}"
          HONKER_RUST_TARGET="$RUST_TARGET" scripts/copy-python-extension.sh
          if [[ "$RUNNER_OS_NAME" == "Windows" ]]; then
            python -m maturin build --release \
              --features bundled-sqlite \
              --manifest-path packages/honker/Cargo.toml \
              --out dist
          else
            python -m maturin "${maturin_args[@]}"
          fi
          python scripts/proof/check-python-wheel.py dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: honker-python-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error
