name: Proof · crates.io package

# Proves honker-core + honker-extension release packaging when a tag
# matching `core-v*` or `ext-v*` is pushed. Publishing is done locally.
#
# Usage:
#   git tag core-v0.1.1 && git push origin core-v0.1.1
#   git tag ext-v0.1.1  && git push origin ext-v0.1.1
#
on:
  push:
    tags:
      - "core-v*"
      - "ext-v*"
  workflow_dispatch:
    inputs:
      crate:
        description: "Which crate to publish"
        required: true
        type: choice
        options:
          - honker-core
          - honker-extension

# Source-tree hash pinning lives per-job (hashFiles() can't run at
# workflow level before checkout). See ci.yml for context.

permissions:
  contents: read

jobs:
  package-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Don't leave the GITHUB_TOKEN in `.git/config` for later
          # steps to scoop up.
          persist-credentials: false
      - name: Set up Rust
        run: rustup default stable
      # No rust-cache here. Releases run on tag-push (rare), so the
      # ~60s saved by sharing ci.yml's cache isn't worth the cache-
      # poisoning surface area: a compromised PR run could populate
      # an entry that this workflow restores under release context.

      - name: Determine crate
        id: crate
        # Pull `${{ … }}` into env vars first; never expand template
        # context directly into a shell run: block. (template-injection
        # mitigation per zizmor.)
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          INPUT_CRATE: ${{ github.event.inputs.crate }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "name=$INPUT_CRATE" >> $GITHUB_OUTPUT
          elif [[ "$REF" == refs/tags/core-v* ]]; then
            echo "name=honker-core" >> $GITHUB_OUTPUT
          elif [[ "$REF" == refs/tags/ext-v* ]]; then
            echo "name=honker-extension" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag pattern: $REF" >&2
            exit 1
          fi

      - name: Verify test suite before publish
        run: cargo test -p honker-core --release --lib

      - name: Package crate
        env:
          CRATE: ${{ steps.crate.outputs.name }}
        run: cargo package -p "$CRATE"
